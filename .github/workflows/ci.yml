name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  quality:
    name: Lint & Typecheck & Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build TypeDoc API docs
        run: npx typedoc

      # ── GitHub Pages deployment (push to master only) ──
      - name: Prepare pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          mkdir -p pages
          if [ -d coverage ]; then cp -r coverage pages/coverage; fi
          if [ -d docs/api ]; then cp -r docs/api pages/api; fi
          cat > pages/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>@agentix-e/spel-ts — Documentation</title>
          <style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:800px;margin:48px auto;padding:0 24px;line-height:1.6;background:#0d1117;color:#c9d1d9}h1{font-size:2rem;border-bottom:2px solid #30363d;padding-bottom:12px}a{color:#58a6ff;text-decoration:none}a:hover{text-decoration:underline}.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin:16px 0}.card h2{margin:0 0 8px;font-size:1.25rem}.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;background:#238636;color:#fff}</style>
          </head><body>
          <h1>@agentix-e/spel-ts</h1>
          <p>Pure TypeScript Spring Expression Language (SpEL) evaluator.</p>
          <div class="card"><h2><a href="./api/">API Reference</a> <span class="badge">TypeDoc</span></h2><p>Complete API documentation generated from source code.</p></div>
          <div class="card"><h2><a href="./coverage/">Coverage Report</a> <span class="badge">Istanbul</span></h2><p>Test coverage report with per-file line and branch details.</p></div>
          <p style="margin-top:32px"><a href="https://github.com/AgentiX-E/spel-ts">GitHub Repository</a> · <a href="https://www.npmjs.com/package/@agentix-e/spel-ts">npm Package</a></p>
          </body></html>
          HTML

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/deploy-pages@v4
